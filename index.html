<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>터치몬스터 확률 정보</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="eyebrow">Touch Monster</p>
      <h1>터치몬스터 확률 정보</h1>
    </header>

    <section class="notice">
      <p>본 페이지는 터치몬스터 내 확률형 아이템의 확률 정보를 안내합니다.</p>
      <p>확률은 소수점 반올림으로 인해 합계가 100%와 다소 차이날 수 있습니다.</p>
    </section>

    <section class="panel">
      <h2>알 선택</h2>
      <div id="eggButtons" class="egg-buttons"></div>
    </section>

    <section class="panel">
      <div class="summary">
        <div>
          <span>선택한 알</span>
          <strong id="selectedEggName">-</strong>
        </div>
        <div>
          <span>등장 몬스터 수</span>
          <strong id="monsterCount">0마리</strong>
        </div>
      </div>

      <div class="search-row">
        <input id="searchInput" type="search" placeholder="몬스터명 또는 Index 검색" />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Index</th>
              <th>몬스터명</th>
              <th>등급</th>
              <th>속성</th>
              <th>확률</th>
            </tr>
          </thead>
          <tbody id="rateTableBody">
            <tr>
              <td colspan="5" class="empty">데이터를 불러오는 중입니다.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      <p>© Touch Monster. All rights reserved.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
